<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Consumir API REST</title>

    <style>
        * { box-sizing: border-box; }

        body {
            max-width: 680px;
            margin: 32px auto;
            padding: 28px;
            font-family: Arial, Helvetica, sans-serif;
            color: #2f3a45;
            background: #ffffff;
            border: 1px solid #d9e2ec;
            border-radius: 7px;
            box-shadow: 0 2px 8px rgba(30, 50, 70, 0.08);
        }

        #div2 {
            max-width: 680px;
            margin: 32px auto 0;
            padding: 22px;
            color: #ffffff;
            text-align: center;
            background: #334e68;
            border-radius: 7px 7px 0 0;
        }

        #div2 h1 { margin: 0; font-size: 28px; font-weight: normal; }
        h2 { margin: 0 0 18px; color: #243b53; font-size: 20px; }

        input {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            color: #334e68;
            border: 1px solid #bcccdc;
            border-radius: 4px;
            outline: none;
        }

        input:focus {
            border-color: #4f7cac;
            box-shadow: 0 0 0 2px rgba(79, 124, 172, 0.15);
        }

        button {
            padding: 10px 16px;
            margin: 10px 0;
            color: #ffffff;
            cursor: pointer;
            background: #4f7cac;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        }

        button:hover { background: #3e668e; }
        button:disabled { cursor: not-allowed; opacity: 0.6; }

        hr { margin: 28px 0; border: 0; border-top: 1px solid #d9e2ec; }
        ul { padding: 0; margin-top: 20px; list-style: none; }

        li {
            margin: 10px 0;
            padding: 14px;
            background: #f8fafc;
            border: 1px solid #d9e2ec;
            border-radius: 5px;
        }

        li button { margin: 0 0 0 10px; padding: 5px 10px; font-size: 13px; }
        li button:nth-of-type(2) { background: #b85c5c; }
        li button:nth-of-type(2):hover { background: #9e4d4d; }

        .formulario-editar { display: none; margin-top: 14px; padding-top: 10px; border-top: 1px solid #d9e2ec; }
        .formulario-editar.visible { display: block; }
        .formulario-editar input { margin: 5px 0; }

        @media (max-width: 720px) {
            body { margin: 0; min-height: 100vh; border-radius: 0; box-shadow: none; }
            #div2 { margin: 0; border-radius: 0; }
        }
    </style>
</head>


<script type="text/javascript">

$(document).ready(function(){

      var height = $(window).height();

      $('#div2').height(height);
});

</script>

<div id="div2">
<h1>Películas</h1>
</div>

<body>

    <h2>Registrar película</h2>
    

    <form id="formulario">

        <input
            type="text"
            id="titulo"
            placeholder="Título"
            required
        >

        <input
            type="text"
            id="genero"
            placeholder="Género"
            required
        >

        <input
            type="number"
            id="año"
            placeholder="Año"
            required
        >

        <input
            type="number"
            id="duracion"
            placeholder="Duración"
            required
        >

        <input
            type="text"
            id="idioma"
            placeholder="Idioma"
            required
        >

        <input
            type="number"
            id="calificacion"
            placeholder="Calificación"
            min="0"
            max="10"
            step="0.1"
            required
        >

        <button type="submit">
            Guardar película
        </button>

    </form>

    <hr>

    <button id="btnConsultar">
        Consultar películas
    </button>

    <ul id="listaPeliculas"></ul>

    <script src="api.js"></script>
    <script src="app.js"></script>

</body>

</html>
